<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerGym Admin - Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Personalização para o scroll ficar sutil no dark mode */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
    </style>
</head>
<body class="bg-[#0f172a] min-h-screen text-slate-200">

    <nav class="bg-[#1e293b] border-b border-blue-500/30 shadow-lg shadow-blue-500/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-600/40">
                    <i class="fas fa-dumbbell text-white text-xl"></i>
                </div>
                <span class="font-black text-xl tracking-tighter ml-2">POWER<span class="text-blue-500">GYM</span></span>
            </div>
            <div id="userInfo" class="hidden flex items-center gap-6">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Sistema de Gestão v1.0</span>
                <button id="btnLogout" class="bg-slate-800 hover:bg-red-500/20 hover:text-red-400 px-4 py-2 rounded-lg border border-slate-700 transition-all">
                    <i class="fas fa-power-off mr-2"></i>Sair
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        
        <section id="loginSection" class="max-w-md mx-auto bg-[#1e293b] p-10 rounded-3xl shadow-2xl border border-slate-700 mt-10">
            <div class="text-center mb-10">
                <div class="inline-block p-4 rounded-full bg-blue-500/10 mb-4">
                    <i class="fas fa-lock text-blue-500 text-3xl"></i>
                </div>
                <h2 class="text-2xl font-black">ÁREA RESTRITA</h2>
                <p class="text-slate-400 text-sm">Entre com suas credenciais ADM</p>
            </div>
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-blue-400 uppercase mb-2">Usuário</label>
                    <input type="text" id="usuario" required class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-white">
                </div>
                <div>
                    <label class="block text-xs font-bold text-blue-400 uppercase mb-2">Senha</label>
                    <input type="password" id="password" required class="w-full bg-[#0f172a] border border-slate-700 rounded-xl px-4 py-3 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-white">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl shadow-lg shadow-blue-600/30 transition-all transform active:scale-95">
                    ACESSAR SISTEMA
                </button>
                <p id="loginError" class="hidden text-red-400 text-center text-xs font-bold bg-red-400/10 py-2 rounded-lg">Usuário ou senha incorretos!</p>
            </form>
        </section>

        <section id="adminSection" class="hidden space-y-8">
            <div class="flex flex-col lg:flex-row gap-8">
                
                <div class="w-full lg:w-1/3">
                    <div class="bg-[#1e293b] p-8 rounded-2xl border border-slate-700 shadow-xl sticky top-10">
                        <h3 id="formTitle" class="text-lg font-black mb-8 flex items-center gap-3">
                            <span class="w-2 h-8 bg-blue-500 rounded-full"></span>
                            NOVO CADASTRO
                        </h3>
                        <form id="alunoForm" class="space-y-5">
                            <input type="hidden" id="alunoId">
                            <div>
                                <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">Nome do Aluno</label>
                                <input type="text" id="nome" required placeholder="Ex: João Silva" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg py-3 px-4 focus:border-blue-500 outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">CPF</label>
                                <input type="text" id="cpf" required placeholder="000.000.000-00" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg py-3 px-4 focus:border-blue-500 outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase text-slate-500 mb-1">Situação</label>
                                <select id="status" class="w-full bg-[#0f172a] border border-slate-700 rounded-lg py-3 px-4 focus:border-blue-500 outline-none transition-colors appearance-none cursor-pointer">
                                    <option value="Ativo">Ativo</option>
                                    <option value="Inativo">Inativo</option>
                                    <option value="Pendente">Pendente</option>
                                </select>
                            </div>
                            <div class="flex gap-3 pt-4">
                                <button type="submit" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-500 transition-all shadow-lg shadow-blue-600/20">SALVAR</button>
                                <button type="button" id="btnCancelar" class="hidden flex-1 bg-slate-700 text-slate-300 font-bold py-3 rounded-lg hover:bg-slate-600 transition-all">CANCELAR</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="w-full lg:w-2/3">
                    <div class="bg-[#1e293b] rounded-2xl border border-slate-700 shadow-xl overflow-hidden">
                        <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-[#1e293b]">
                            <div>
                                <h3 class="font-black text-white">LISTAGEM DE ALUNOS</h3>
                                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Total: <span id="totalAlunos" class="text-blue-400">0</span> registros</p>
                            </div>
                            <button onclick="carregarAlunos()" class="p-2 bg-slate-800 rounded-lg text-blue-400 hover:text-white transition-colors">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-[#0f172a] text-slate-500 text-[10px] uppercase font-black tracking-widest">
                                    <tr>
                                        <th class="px-6 py-4">Dados do Aluno</th>
                                        <th class="px-6 py-4">Documento</th>
                                        <th class="px-6 py-4">Status</th>
                                        <th class="px-6 py-4 text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaAlunos" class="divide-y divide-slate-800 text-sm">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
