<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Academia - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-slate-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-dumbbell text-yellow-500 text-2xl"></i>
                <span class="font-bold text-xl uppercase tracking-tighter">Power<span class="text-yellow-500">Gym</span></span>
            </div>
            <div id="userInfo" class="hidden flex items-center gap-4">
                <span class="text-sm border-r pr-4 border-slate-600">Painel Administrativo</span>
                <button id="btnLogout" class="hover:text-yellow-500 transition-colors">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <section id="loginSection" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-12">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-black text-slate-800">LOGIN</h2>
                <p class="text-slate-500">Acesse o sistema de gestão</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Usuário</label>
                    <input type="text" id="usuario" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-yellow-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Senha</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-yellow-500 outline-none transition-all">
                </div>
                <button type="submit" class="w-full bg-slate-800 text-white font-bold py-3 rounded-lg hover:bg-slate-700 transition-all shadow-lg">ENTRAR</button>
                <p id="loginError" class="hidden text-red-500 text-center text-sm font-bold">Usuário ou senha inválidos!</p>
            </form>
        </section>

        <section id="adminSection" class="hidden space-y-6">
            <div class="flex flex-col md:flex-row gap-6">
                
                <div class="w-full md:w-1/3">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <h3 id="formTitle" class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                            <i class="fas fa-user-plus text-yellow-500"></i> Novo Aluno
                        </h3>
                        <form id="alunoForm" class="space-y-4">
                            <input type="hidden" id="alunoId">
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-500">Nome Completo</label>
                                <input type="text" id="nome" required class="w-full border-b-2 border-slate-100 py-2 focus:border-yellow-500 outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-500">CPF</label>
                                <input type="text" id="cpf" required class="w-full border-b-2 border-slate-100 py-2 focus:border-yellow-500 outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase text-slate-500">Status</label>
                                <select id="status" class="w-full border-b-2 border-slate-100 py-2 focus:border-yellow-500 outline-none transition-colors">
                                    <option value="Ativo">Ativo</option>
                                    <option value="Inativo">Inativo</option>
                                    <option value="Pendente">Pendente</option>
                                </select>
                            </div>
                            <div class="flex gap-2 pt-4">
                                <button type="submit" class="flex-1 bg-yellow-500 text-slate-900 font-bold py-2 rounded-lg hover:bg-yellow-400 transition-all">SALVAR</button>
                                <button type="button" id="btnCancelar" class="hidden flex-1 bg-slate-100 text-slate-600 font-bold py-2 rounded-lg hover:bg-slate-200 transition-all">CANCELAR</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="w-full md:w-2/3">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                            <h3 class="font-bold text-slate-800">Alunos Cadastrados (<span id="totalAlunos">0</span>)</h3>
                            <button onclick="carregarAlunos()" class="text-sm text-yellow-600 font-bold hover:underline">
                                <i class="fas fa-sync-alt"></i> Atualizar
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 text-slate-400 text-xs uppercase font-black">
                                    <tr>
                                        <th class="px-6 py-4">Nome</th>
                                        <th class="px-6 py-4">CPF</th>
                                        <th class="px-6 py-4">Status</th>
                                        <th class="px-6 py-4 text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaAlunos" class="divide-y divide-slate-100 text-sm">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
